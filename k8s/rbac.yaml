# RBAC for the operator control-plane app.
#
# Read access is cluster-scoped because CRDs and namespaces are cluster-scoped
# and the Operators panel needs to see them. Write access (rollout restart,
# pod delete) is scoped per-namespace via two RoleBindings to keep the blast
# radius limited to the namespaces this app actually drives.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cso-operator-app
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cso-operator-app-reader
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cso-operator-app-reader
subjects:
  - kind: ServiceAccount
    name: cso-operator-app
    namespace: default
roleRef:
  kind: ClusterRole
  name: cso-operator-app-reader
  apiGroup: rbac.authorization.k8s.io
---
# One Role per watched namespace — patch deployments (rollout restart) and
# delete pods. Mirrors the ALLOWED_NS set in backend/routers/k8s.py.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cso-operator-app-writer
  namespace: default
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cso-operator-app-writer
  namespace: default
subjects:
  - kind: ServiceAccount
    name: cso-operator-app
    namespace: default
roleRef:
  kind: Role
  name: cso-operator-app-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cso-operator-app-writer
  namespace: cld-streaming
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
  - apiGroups: ["kafka.strimzi.io"]
    resources: ["kafkatopics"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cso-operator-app-writer
  namespace: cld-streaming
subjects:
  - kind: ServiceAccount
    name: cso-operator-app
    namespace: default
roleRef:
  kind: Role
  name: cso-operator-app-writer
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cso-operator-app-writer
  namespace: cfm-streaming
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cso-operator-app-writer
  namespace: cfm-streaming
subjects:
  - kind: ServiceAccount
    name: cso-operator-app
    namespace: default
roleRef:
  kind: Role
  name: cso-operator-app-writer
  apiGroup: rbac.authorization.k8s.io
