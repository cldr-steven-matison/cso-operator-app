apiVersion: v1
kind: ConfigMap
metadata:
  name: cso-operator-app-config
data:
  VLLM_URL: "http://vllm-service.default.svc.cluster.local:8000"
  VLLM_MODEL: "Qwen/Qwen2.5-3B-Instruct"
  QDRANT_URL: "http://qdrant.default.svc.cluster.local:6333"
  QDRANT_COLLECTION: "my-rag-collection"
  EMBED_URL: "http://embedding-server-service.default.svc.cluster.local:80"
  EMBED_DIM: "768"
  WHISPER_URL: "http://whisper-service.default.svc.cluster.local:8001"
  # mynifi-web Service publishes 8443, not 443 — omitting the port makes
  # every NiFi call hang on TCP connect to :443. Include it explicitly.
  NIFI_URL: "https://mynifi-web.cfm-streaming.svc.cluster.local:8443"
  NIFI_VERIFY_TLS: "false"
  NIFI_INGEST_URL: "http://mynifi.cfm-streaming.svc.cluster.local:9000/contentListener"
  EFM_URL: "http://efm.cld-streaming.svc:10090"
  KAFKA_BOOTSTRAP: "my-cluster-kafka-bootstrap.cld-streaming.svc:9092"
  TOPIC_AUDIO: "new_audio"
  TOPIC_DOCS: "new_documents"
  # Active modules — controls which tabs and backend routes are enabled.
  # Operator is always on. Add/remove: efm, rag, streamers
  MODULES: "rag,streamers"
  CLIP_STORAGE_PATH: "/clips"
  NEW_CLIPS_TOPIC: "new_clips"
  PROCESSED_CLIPS_TOPIC: "processed_clips"
  # Kick API (values injected via kubectl set env / Secret)
  KICK_CLIENT_ID: ""
  KICK_CLIENT_SECRET: ""
  # X (Twitter) API — OAuth 1.0a (values injected via kubectl set env / Secret)
  X_API_KEY: ""
  X_API_SECRET: ""
  X_ACCESS_TOKEN: ""
  X_ACCESS_TOKEN_SECRET: ""
