apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-server
  template:
    metadata:
      labels:
        app: embedding-server
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      # The Init Container runs to completion BEFORE the main TEI container starts
      initContainers:
        - name: model-downloader
          image: python:3.10-slim
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # Pin huggingface_hub to a 0.x release so local_dir produces a
              # plain copy of the files (no symlinks into a separate cache).
              # huggingface_hub 1.x changed local_dir semantics and writes
              # via os.replace which can land us with a stale config.json
              # post-repair.
              pip install --no-cache-dir 'huggingface_hub<1.0'
              python3 -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='nomic-ai/nomic-embed-text-v1', local_dir='/data', local_dir_use_symlinks=False, token='$HF_TOKEN')"

              echo "--- ls /data (post-download) ---"
              ls -la /data | head -30
              echo "--- before repair (occurrences of max_position_embeddings) ---"
              grep -c max_position_embeddings /data/config.json || true

              # Repair via Python: json.load keeps last occurrence on dict
              # construction, so a load+dump cycle removes duplicates. Write
              # to a temp file then atomically replace.
              python3 - <<'PY'
              import json, os
              with open('/data/config.json') as f:
                  d = json.load(f)
              tmp = '/data/config.json.tmp'
              with open(tmp, 'w') as f:
                  json.dump(d, f, indent=2)
              os.replace(tmp, '/data/config.json')
              PY

              echo "--- after repair (occurrences of max_position_embeddings) ---"
              grep -c max_position_embeddings /data/config.json || true
              echo "--- /data/config.json (first 60 lines) ---"
              head -60 /data/config.json
              echo "config.json repaired"
          volumeMounts:
            - name: model-cache
              mountPath: /data
      containers:
        - name: tei-container
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
          command: ["/bin/sh", "-c"]
          args: 
            - |
              # Runs offline instantly out of the shared emptyDir storage layer populated by the init container
              text-embeddings-router --model-id /data --port 80
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: model-cache
              mountPath: /data
      volumes:
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-server-service
spec:
  selector:
    app: embedding-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP