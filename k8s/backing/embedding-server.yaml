apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-server
  template:
    metadata:
      labels:
        app: embedding-server
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      # The Init Container runs to completion BEFORE the main TEI container starts
      initContainers:
        - name: model-downloader
          image: python:3.10-slim
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              pip install --no-cache-dir huggingface_hub
              python3 -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='nomic-ai/nomic-embed-text-v1', local_dir='/data', token='$HF_TOKEN')"
              # Repair config.json: nomic-embed-text-v1 ships a duplicate
              # `max_position_embeddings` which TEI's strict JSON parser rejects.
              # Python's json module keeps the last occurrence — round-tripping
              # rewrites the file with one entry.
              python3 -c "import json,sys; d=json.load(open('/data/config.json')); json.dump(d,open('/data/config.json','w'),indent=2)"
              echo "config.json repaired"
          volumeMounts:
            - name: model-cache
              mountPath: /data
      containers:
        - name: tei-container
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
          command: ["/bin/sh", "-c"]
          args: 
            - |
              # Runs offline instantly out of the shared emptyDir storage layer populated by the init container
              text-embeddings-router --model-id /data --port 80
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: model-cache
              mountPath: /data
      volumes:
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-server-service
spec:
  selector:
    app: embedding-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP