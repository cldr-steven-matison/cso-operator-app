apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: embedding-server
  template:
    metadata:
      labels:
        app: embedding-server
    spec:
      dnsPolicy: ClusterFirstWithHostNet
      # The Init Container runs to completion BEFORE the main TEI container starts
      initContainers:
        - name: model-downloader
          image: python:3.10-slim
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: HF_TOKEN
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              # Pin huggingface_hub to a 0.x release so local_dir produces a
              # plain copy of the files (no symlinks into a separate cache).
              # huggingface_hub 1.x changed local_dir semantics and writes
              # via os.replace which can land us with a stale config.json
              # post-repair.
              pip install --no-cache-dir 'huggingface_hub<1.0'
              python3 -c "from huggingface_hub import snapshot_download; snapshot_download(repo_id='nomic-ai/nomic-embed-text-v1', local_dir='/data', local_dir_use_symlinks=False, token='$HF_TOKEN')"

              echo "--- ls /data (post-download) ---"
              ls -la /data | head -30
              echo "--- before repair (occurrences of max_position_embeddings) ---"
              grep -c max_position_embeddings /data/config.json || true

              # Repair config.json: nomic-embed-text-v1 ships GPT-style alias
              # fields (n_positions, n_embd, n_inner, etc.) alongside their
              # BERT-style equivalents (max_position_embeddings, hidden_size,
              # intermediate_size, ...). TEI's Rust BertConfig has serde
              # aliases for each pair, so when both keys are present they
              # deserialize into the same Rust field and serde errors:
              #   "duplicate field `max_position_embeddings` at line 37"
              # (the line of n_positions, with the Rust field name reported).
              # Strip the GPT-style aliases.
              python3 - <<'PY'
              import json, os
              with open('/data/config.json') as f:
                  d = json.load(f)
              aliases = (
                  "n_positions", "n_embd", "n_inner", "n_head", "n_layer",
                  "layer_norm_epsilon", "attn_pdrop", "embd_pdrop", "resid_pdrop",
              )
              removed = [k for k in aliases if k in d]
              for k in removed:
                  d.pop(k, None)
              tmp = '/data/config.json.tmp'
              with open(tmp, 'w') as f:
                  json.dump(d, f, indent=2)
              os.replace(tmp, '/data/config.json')
              print("removed GPT-style aliases:", removed)
              PY

              echo "--- after repair (occurrences of max_position_embeddings) ---"
              grep -c max_position_embeddings /data/config.json || true
              echo "--- /data/config.json (first 60 lines) ---"
              head -60 /data/config.json
              echo "config.json repaired"
          volumeMounts:
            - name: model-cache
              mountPath: /data
      containers:
        - name: tei-container
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "--- TEI sees /data: ---"
              ls -la /data | head -25
              echo "--- TEI sees these max_position_embeddings entries: ---"
              grep -nH max_position_embeddings /data/config.json || true
              grep -nrH max_position_embeddings /data 2>/dev/null | head
              echo "--- size + sha ---"
              wc -c /data/config.json
              sha256sum /data/config.json
              echo "--- launching TEI ---"
              text-embeddings-router --model-id /data --port 80
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "2Gi"
              cpu: "2"
          volumeMounts:
            - name: model-cache
              mountPath: /data
      volumes:
        - name: model-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: embedding-server-service
spec:
  selector:
    app: embedding-server
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP